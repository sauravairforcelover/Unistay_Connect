<html>
  <head>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
    <link
      rel="stylesheet"
      as="style"
      onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?display=swap&amp;family=Inter%3Awght%40400%3B500%3B700%3B900&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900"
    />

    <title>Stitch Design</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  </head>
  <body>
    <div class="relative flex h-auto min-h-screen w-full flex-col bg-white group/design-root overflow-x-hidden" style='font-family: Inter, "Noto Sans", sans-serif;'>
      <div class="layout-container flex h-full grow flex-col">
  <header class="relative flex items-center justify-between whitespace-nowrap px-10 py-3">
          <a href="home%20page.html" class="flex items-center gap-4 text-[#111418]">
            <div class="size-4">
              <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 4H17.3334V17.3334H30.6666V30.6666H44V44H4V4Z" fill="currentColor"></path></svg>
            </div>
            <h2 class="text-[#111418] text-lg font-bold leading-tight tracking-[-0.015em]">UniStayConnect</h2>
          </a>
          <div class="flex flex-1 justify-end gap-8">
            <div class="absolute left-1/2 top-1/2 -translate-y-1/2 -translate-x-1/2 z-10 flex items-center gap-10 rounded-full px-6 py-3 backdrop-blur-md border border-white/10 shadow-sm" style="background: linear-gradient(90deg, rgba(19,128,236,0.10), rgba(255,255,255,0.18));">
              <a class="text-[#111418] text-sm font-medium leading-normal" href="home%20page.html">Home</a>
              <a class="text-[#111418] text-sm font-medium leading-normal" href="aboutus.html">About</a>
              <a class="text-[#111418] text-sm font-medium leading-normal" href="aboutus.html">Contact</a>
            </div>
            <a href="#login" class="flex min-w-[84px] max-w-[480px] items-center justify-center overflow-hidden rounded-xl h-10 px-4 bg-[#1380ec] text-white text-sm font-bold leading-normal tracking-[0.015em]">
              <span class="truncate">Login</span>
            </a>
          </div>
        </header>
        <div class="px-40 flex flex-1 justify-center py-5">
          <div class="layout-content-container flex flex-col w-[512px] max-w-[512px] py-5 max-w-[960px] flex-1">
            <h2 class="text-[#111418] tracking-light text-[28px] font-bold leading-tight px-4 text-center pb-3 pt-5">Welcome to UniStayConnect</h2>
            <div class="pb-3">
              <div class="flex border-b border-[#dbe0e6] px-4 gap-8">
                <a id="tab-login" class="flex flex-col items-center justify-center border-b-[3px] border-b-transparent text-[#617589] pb-[13px] pt-4" href="#login">
                  <p class="text-[#617589] text-sm font-bold leading-normal tracking-[0.015em]">Login</p>
                </a>
                <a id="tab-signup" class="flex flex-col items-center justify-center border-b-[3px] border-b-transparent text-[#617589] pb-[13px] pt-4" href="#signup">
                  <p class="text-[#617589] text-sm font-bold leading-normal tracking-[0.015em]">Sign Up</p>
                </a>
              </div>
            </div>
            <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
              <label class="flex flex-col min-w-40 flex-1">
                <p class="text-[#111418] text-base font-medium leading-normal pb-2">Email</p>
                <input
                  placeholder="Enter your email"
                  class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#111418] focus:outline-0 focus:ring-0 border border-[#dbe0e6] bg-white focus:border-[#dbe0e6] h-14 placeholder:text-[#617589] p-[15px] text-base font-normal leading-normal"
                  value=""
                />
              </label>
            </div>
            <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
              <label class="flex flex-col min-w-40 flex-1">
                <p class="text-[#111418] text-base font-medium leading-normal pb-2">Password</p>
                <input
                  placeholder="Enter your password"
                  class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#111418] focus:outline-0 focus:ring-0 border border-[#dbe0e6] bg-white focus:border-[#dbe0e6] h-14 placeholder:text-[#617589] p-[15px] text-base font-normal leading-normal"
                  value=""
                />
              </label>
            </div>
            <div class="flex px-4 py-3">
              <button
                class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-10 px-4 flex-1 bg-[#1380ec] text-white text-sm font-bold leading-normal tracking-[0.015em]"
              >
                <span class="truncate">Login</span>
              </button>
            </div>
            <p class="text-[#617589] text-sm font-normal leading-normal pb-3 pt-1 px-4 text-center">Or continue with</p>
            <div class="flex justify-center">
              <div class="flex flex-1 gap-3 flex-wrap px-4 py-3 max-w-[480px] justify-center">
                <button
                  class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-10 px-4 bg-[#f0f2f4] text-[#111418] text-sm font-bold leading-normal tracking-[0.015em] grow"
                >
                  <span class="truncate">Continue with Google</span>
                </button>
                <button
                  class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-10 px-4 bg-[#f0f2f4] text-[#111418] text-sm font-bold leading-normal tracking-[0.015em] grow"
                >
                  <span class="truncate">Continue with Facebook</span>
                </button>
              </div>
            </div>
            <p class="text-[#617589] text-sm font-normal leading-normal pb-3 pt-1 px-4 text-center underline">Don't have an account? <a href="#signup">Sign up</a></p>
            
            <script>
              // Tab switcher: activate tab based on location.hash
              function setActiveTab(hash) {
                const loginTab = document.getElementById('tab-login');
                const signupTab = document.getElementById('tab-signup');
                if (!loginTab || !signupTab) return;
                // reset
                loginTab.classList.remove('border-b-[#111418]');
                loginTab.classList.remove('text-[#111418]');
                loginTab.classList.add('border-b-transparent');
                loginTab.querySelector('p')?.classList.remove('text-[#111418]');
                loginTab.querySelector('p')?.classList.add('text-[#617589]');
                signupTab.classList.remove('border-b-[#111418]');
                signupTab.classList.remove('text-[#111418]');
                signupTab.classList.add('border-b-transparent');
                signupTab.querySelector('p')?.classList.remove('text-[#111418]');
                signupTab.querySelector('p')?.classList.add('text-[#617589]');

                if (hash === '#signup') {
                  signupTab.classList.remove('border-b-transparent');
                  signupTab.classList.add('border-b-[#111418]');
                  signupTab.querySelector('p')?.classList.remove('text-[#617589]');
                  signupTab.querySelector('p')?.classList.add('text-[#111418]');
                } else {
                  // default to login
                  loginTab.classList.remove('border-b-transparent');
                  loginTab.classList.add('border-b-[#111418]');
                  loginTab.querySelector('p')?.classList.remove('text-[#617589]');
                  loginTab.querySelector('p')?.classList.add('text-[#111418]');
                }
              }
              document.addEventListener('DOMContentLoaded', function() {
                setActiveTab(location.hash || '#login');
                // when hash changes (e.g., user clicks link), update active tab
                window.addEventListener('hashchange', function() { setActiveTab(location.hash); });
              });
            </script>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
